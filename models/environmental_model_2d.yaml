# This YAML file defines a reference schema for a graph-friendly 2D environmental world model. It includes sections for schema metadata, spatial context, variable definitions, and process stages. The model is designed to be modular and extensible, allowing for the addition of new variables, interactions, and numerical methods as needed.

schema: # Schema version identifier for compatibility checks and validation.
  name: environmental_model_2d
  version: "1.2"
  description: "Environmental model simulating basic atmospheric, hydrological, and biospheric processes on a 2D grid."
  author: "Colin Bossu Réaubourg"

domains: # Predefined variable domains that can be referenced by variables for validation and documentation. Each domain defines a kind (e.g., interval, categorical) and the necessary parameters to specify the valid range or categories of values.
  # domain_name:
  #   kind: interval
  #   min: value
  #   max: value
  altitude_m:
    kind: interval
    min: -4000
    max: 4000
  pressure_pa:
    kind: interval
    min: 90000
    max: 110000
  temperature_k:
    kind: interval
    min: 0
    max: 330
  unit_fraction:
    kind: interval
    min: 0
    max: 1
  water_vapor_density_kg_per_m3:
    kind: interval
    min: 0.00001
    max: 0.03
  velocity_component_m_per_s:
    kind: interval
    min: 0
    max: 100
  precipitation_flux_m_per_s:
    kind: interval
    min: 0.00001
    max: 0.001
  solar_irradiance_w_per_m2:
    kind: interval
    min: 1
    max: 1000
  water_height_m:
    kind: interval
    min: 0
    max: domains.altitude_m.max
  time_of_day_s:
    kind: interval
    min: 0
    max: 86400
  leaf_area_index_1:
    kind: interval
    min: 0
    max: 10

variables: # List of all variables used in the model, including parameters, state variables, derived diagnostics, and forcing fields. Each variable is defined with its role, support, value kind, units, and optionally a reference to a predefined domain for its valid range. Parameters can also have fixed literal values.
  # - id: variable_name
  #   role: parameter/derived/state (used to categorize variables based on their function in the model)
  #   support: cell/global (depending on whether the variable is defined at each grid cell or is a single global value for the whole model)
  #   value_kind: scalar/vector2/bool/etc. (describes the type of value the variable holds, will help the interface determine how to visualize and edit it)
  #   units: "m"/"kg/m/s^2"/"K"/"1"/etc. (units for physical interpretation)
  #   domain_ref: domain_name (optional reference to a predefined domain)
  #   value: literal_value (for parameters with fixed values)
  #   label: "Any Variable" (human-readable name for visualization and documentation)
  #   symbol: symbol (used for compact representation in equations)
  #   description: "Description of the variable."

  - id: altitude
    role: parameter
    support: cell
    value_kind: scalar
    units: "m"
    domain_ref: altitude_m
    label: "Altitude"
    symbol: h
    description: "Terrain elevation at each grid cell."

  - id: pressure
    role: derived
    support: cell
    value_kind: scalar
    units: "kg/m/s^2"
    domain_ref: pressure_pa
    label: "Pressure"
    symbol: p
    description: "Hydrostatic air pressure derived from altitude and local temperature."

  - id: temperature
    role: state
    support: cell
    value_kind: scalar
    units: "K"
    domain_ref: temperature_k
    label: "Temperature"
    symbol: T
    description: "Air temperature at cell centers."

  - id: water_vapor_density
    role: state
    support: cell
    value_kind: scalar
    units: "kg/m^3"
    domain_ref: water_vapor_density_kg_per_m3
    label: "Water Vapor Density"
    symbol: rho_v
    description: "Water vapor mass density carried by the air."

  - id: relative_humidity
    role: derived
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: unit_fraction
    label: "Relative Humidity"
    symbol: rh
    description: "Ratio between vapor density and an approximate saturation density."

  - id: wind_velocity
    role: forcing
    support: cell
    value_kind: vector2
    units: "m/s"
    domain_ref: velocity_component_m_per_s
    label: "Wind Velocity"
    symbol: u
    description: "Horizontal wind velocity used by advection operators."

  - id: precipitation_flux
    role: forcing
    support: cell
    value_kind: scalar
    units: "m/s"
    domain_ref: precipitation_flux_m_per_s
    label: "Precipitation Flux"
    symbol: q_rain
    description: "Water-equivalent vertical flux added to the surface."

  - id: solar_irradiance
    role: derived
    support: global
    value_kind: scalar
    units: "kg/s^3"
    domain_ref: solar_irradiance_w_per_m2
    label: "Solar Irradiance"
    symbol: I_solar
    description: "Global incoming shortwave irradiance derived from the day cycle."

  - id: water_height
    role: state
    support: cell
    value_kind: scalar
    units: "m"
    domain_ref: water_height_m
    boundary_override:
      x_max:
        type: outflow
    label: "Water Height"
    symbol: h_w
    description: "Surface water depth above the terrain."

  - id: soil_fertility_index
    role: derived
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: unit_fraction
    label: "Soil Fertility Index"
    symbol: f_soil
    description: "Normalized fertility score derived from mineral content and soil moisture."

  - id: soil_water_fraction
    role: state
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: unit_fraction
    label: "Soil Water Fraction"
    symbol: theta
    description: "Volumetric fraction of water stored in the soil."

  - id: climatic_fertility_index
    role: derived
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: unit_fraction
    label: "Climatic Fertility Index"
    symbol: f_climate
    description: "Normalized plant-growth potential derived from temperature, sunlight, and rainfall."

  - id: leaf_area_index
    role: state
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: leaf_area_index_1
    label: "Leaf Area Index"
    symbol: lai
    description: "Total leaf area per unit ground area."

  - id: time
    role: state
    support: global
    value_kind: scalar
    units: "s"
    label: "Time"
    symbol: t
    description: "Accumulated simulation time."

  - id: time_of_day
    role: derived
    support: global
    value_kind: scalar
    units: "s"
    domain_ref: time_of_day_s
    label: "Time of Day"
    symbol: t_day
    description: "Daily cycle time derived from total simulation time."

  - id: solar_phase
    role: derived
    support: global
    value_kind: bool
    units: "1"
    label: "Solar Phase"
    symbol: is_day
    description: "Boolean day or night indicator."

  - id: soil_mineral_fraction
    role: parameter
    support: cell
    value_kind: scalar
    units: "1"
    domain_ref: unit_fraction
    label: "Soil Mineral Fraction"
    symbol: f_mineral
    description: "Fraction of mineral and nutrient content available in the soil."

  - id: dt
    role: parameter
    support: global
    value_kind: scalar
    units: "s"
    value: 3600
    label: "Time Step"
    symbol: dt
    description: "Nominal integration time step."

  - id: seconds_per_day
    role: parameter
    support: global
    value_kind: scalar
    units: "s"
    value: 86400
    label: "Seconds Per Day"
    symbol: day_s
    description: "Length of one solar day."

  - id: sunrise_time
    role: parameter
    support: global
    value_kind: scalar
    units: "s"
    domain_ref: time_of_day_s
    value: 21600
    label: "Sunrise Time"
    symbol: t_sunrise
    description: "Daily time at which daylight starts."

  - id: sunset_time
    role: parameter
    support: global
    value_kind: scalar
    units: "s"
    domain_ref: time_of_day_s
    value: 64800
    label: "Sunset Time"
    symbol: t_sunset
    description: "Daily time at which daylight ends."

  - id: solar_peak_irradiance
    role: parameter
    support: global
    value_kind: scalar
    units: "kg/s^3"
    value: 1000
    label: "Solar Peak Irradiance"
    symbol: I_peak
    description: "Peak clear-sky irradiance used by the daylight forcing curve."

  - id: sea_level_pressure
    role: parameter
    support: global
    value_kind: scalar
    units: "kg/m/s^2"
    value: 101325
    label: "Sea Level Pressure"
    symbol: p0
    description: "Reference pressure at sea level."

  - id: pressure_scale_height
    role: parameter
    support: global
    value_kind: scalar
    units: "m"
    value: 8400
    label: "Pressure Scale Height"
    symbol: H_p
    description: "Characteristic height scale used by the hydrostatic pressure approximation."

  - id: reference_saturation_vapor_density
    role: parameter
    support: global
    value_kind: scalar
    units: "kg/m^3"
    value: 0.0048
    label: "Reference Saturation Vapor Density"
    symbol: rho_sat_ref
    description: "Reference vapor density used by the humidity approximation."

  - id: vapor_temperature_sensitivity
    role: parameter
    support: global
    value_kind: scalar
    units: "1/K"
    value: 0.06
    label: "Vapor Temperature Sensitivity"
    symbol: beta_v
    description: "Temperature sensitivity coefficient for the humidity approximation."

  - id: surface_water_diffusivity
    role: parameter
    support: global
    value_kind: scalar
    units: "m^2/s"
    value: 0.2
    label: "Surface Water Diffusivity"
    symbol: D_w
    description: "Effective diffusivity used to spread standing water over the grid."

  - id: infiltration_rate
    role: parameter
    support: global
    value_kind: scalar
    units: "1/s"
    value: 5.0e-6
    label: "Infiltration Rate"
    symbol: k_in
    description: "Rate at which standing water infiltrates into the soil."

  - id: surface_evaporation_flux
    role: parameter
    support: global
    value_kind: scalar
    units: "m/s"
    value: 1.0e-7
    label: "Surface Evaporation Flux"
    symbol: q_evap
    description: "Daylight evaporation flux removed from surface water."

  - id: soil_recharge_rate
    role: parameter
    support: global
    value_kind: scalar
    units: "1/m/s"
    value: 1.0e-4
    label: "Soil Recharge Rate"
    symbol: k_recharge
    description: "Rate at which surface water recharges the soil moisture fraction."

  - id: soil_drainage_rate
    role: parameter
    support: global
    value_kind: scalar
    units: "1/s"
    value: 1.0e-6
    label: "Soil Drainage Rate"
    symbol: k_drain
    description: "Slow drainage term that removes water from the soil store."

  - id: vegetation_growth_rate
    role: parameter
    support: global
    value_kind: scalar
    units: "1/s"
    value: 3.0e-7
    label: "Vegetation Growth Rate"
    symbol: k_growth
    description: "Maximum leaf-area growth rate under favorable conditions."

  - id: vegetation_decay_rate
    role: parameter
    support: global
    value_kind: scalar
    units: "1/s"
    value: 1.0e-7
    label: "Vegetation Decay Rate"
    symbol: k_decay
    description: "Background decay rate of vegetation cover."

  - id: max_leaf_area_index
    role: parameter
    support: global
    value_kind: scalar
    units: "1"
    value: 6.0
    label: "Maximum Leaf Area Index"
    symbol: lai_max
    description: "Upper carrying capacity for the vegetation canopy."

  - id: optimal_growth_temperature
    role: parameter
    support: global
    value_kind: scalar
    units: "K"
    value: 293.15
    label: "Optimal Growth Temperature"
    symbol: T_opt
    description: "Temperature at which climatic growth potential is maximal."

  - id: growth_temperature_tolerance
    role: parameter
    support: global
    value_kind: scalar
    units: "K"
    value: 20.0
    label: "Growth Temperature Tolerance"
    symbol: T_tol
    description: "Half-width of the temperature window favorable to vegetation growth."

  - id: beneficial_precipitation_flux
    role: parameter
    support: global
    value_kind: scalar
    units: "m/s"
    value: 2.0e-7
    label: "Beneficial Precipitation Flux"
    symbol: q_benefit
    description: "Rainfall level considered sufficient for maximal climatic fertility."

numerics: # Numerical settings that govern the integration of the model equations, including time-stepping methods, advection and diffusion schemes, and any other algorithmic choices that affect the stability and accuracy of the simulation.
  dt_ref: dt # Reference time step variable used for stability checks and adaptive stepping.
  time_integrator: explicit_euler # Time integration method (e.g., explicit_euler, rk4, implicit, verlet)
  advection_scheme: first_order_upwind # Advection scheme used for transport interactions (e.g., first_order_upwind, second_order_central, semi_lagrangian)
  diffusion_scheme: central_difference # Diffusion scheme used for diffusion interactions (e.g., central_difference, forward_euler, implicit)

stages: # Ordered list of process stages that define the sequence of interactions applied at each time step. Each stage can contain multiple interactions, and the order of stages determines the overall coupling between different processes in the model.
  - id: timekeeping
    description: "Advance the global clock and derive day or night forcing variables."
    interactions:
      - id: advance_time
        kind: compute
        reads:
          - time
          - dt
        writes:
          - time
        schedule:
          read_scope: stage_input
          write_mode: replace
        ast:
          kind: op
          op: add
          args:
            - kind: ref
              id: time
            - kind: ref
              id: dt

      - id: compute_time_of_day
        kind: compute
        reads:
          - time
          - seconds_per_day
        writes:
          - time_of_day
        schedule:
          read_scope: stage_working
          write_mode: replace
        ast:
          kind: call
          name: mod
          args:
            - kind: ref
              id: time
            - kind: ref
              id: seconds_per_day

      - id: compute_solar_phase
        kind: compute
        reads:
          - time_of_day
          - sunrise_time
          - sunset_time
        writes:
          - solar_phase
        schedule:
          read_scope: stage_working
          write_mode: replace
        ast:
          kind: op
          op: and
          args:
            - kind: op
              op: gte
              args:
                - kind: ref
                  id: time_of_day
                - kind: ref
                  id: sunrise_time
            - kind: op
              op: lt
              args:
                - kind: ref
                  id: time_of_day
                - kind: ref
                  id: sunset_time

      - id: compute_solar_irradiance
        kind: compute
        reads:
          - solar_phase
          - time_of_day
          - sunrise_time
          - sunset_time
          - solar_peak_irradiance
        writes:
          - solar_irradiance
        schedule:
          read_scope: stage_working
          write_mode: replace
        ast:
          kind: if
          condition:
            kind: ref
            id: solar_phase
          then:
            kind: op
            op: mul
            args:
              - kind: ref
                id: solar_peak_irradiance
              - kind: call
                name: max
                args:
                  - kind: literal
                    value: 0.0
                  - kind: call
                    name: sin
                    args:
                      - kind: op
                        op: mul
                        args:
                          - kind: literal
                            value: 3.141592653589793
                          - kind: op
                            op: div
                            args:
                              - kind: op
                                op: sub
                                args:
                                  - kind: ref
                                    id: time_of_day
                                  - kind: ref
                                    id: sunrise_time
                              - kind: op
                                op: sub
                                args:
                                  - kind: ref
                                    id: sunset_time
                                  - kind: ref
                                    id: sunrise_time
          else:
            kind: literal
            value: 0.0

  - id: atmosphere
    description: "Transport water vapor and derive atmospheric diagnostics."
    interactions:
      - id: advect_water_vapor
        kind: advection
        reads:
          - water_vapor_density
          - wind_velocity
        writes:
          - water_vapor_density
        schedule:
          read_scope: stage_input
          write_mode: replace
        source: water_vapor_density
        velocity: wind_velocity

      - id: compute_pressure
        kind: compute
        reads:
          - altitude
          - temperature
          - sea_level_pressure
          - pressure_scale_height
        writes:
          - pressure
        schedule:
          read_scope: stage_input
          write_mode: replace
        ast:
          kind: op
          op: mul
          args:
            - kind: ref
              id: sea_level_pressure
            - kind: call
              name: exp
              args:
                - kind: op
                  op: sub
                  args:
                    - kind: literal
                      value: 0.0
                    - kind: op
                      op: div
                      args:
                        - kind: ref
                          id: altitude
                        - kind: ref
                          id: pressure_scale_height
            - kind: op
              op: div
              args:
                - kind: literal
                  value: 288.15
                - kind: ref
                  id: temperature

      - id: compute_relative_humidity
        kind: compute
        reads:
          - water_vapor_density
          - temperature
          - reference_saturation_vapor_density
          - vapor_temperature_sensitivity
        writes:
          - relative_humidity
        schedule:
          read_scope: stage_working
          write_mode: replace
        ast:
          kind: op
          op: div
          args:
            - kind: ref
              id: water_vapor_density
            - kind: op
              op: mul
              args:
                - kind: ref
                  id: reference_saturation_vapor_density
                - kind: call
                  name: exp
                  args:
                    - kind: op
                      op: mul
                      args:
                        - kind: ref
                          id: vapor_temperature_sensitivity
                        - kind: op
                          op: sub
                          args:
                            - kind: ref
                              id: temperature
                            - kind: literal
                              value: 273.15

  - id: hydrology
    description: "Update standing water and soil moisture using forcing, diffusion, and recharge."
    interactions:
      - id: surface_water_balance
        kind: source_sink
        reads:
          - water_height
          - precipitation_flux
          - solar_phase
          - surface_evaporation_flux
          - infiltration_rate
        writes:
          - water_height
        schedule:
          read_scope: stage_input
          write_mode: accumulate
        target: water_height
        term:
          kind: op
          op: sub
          args:
            - kind: op
              op: sub
              args:
                - kind: ref
                  id: precipitation_flux
                - kind: if
                  condition:
                    kind: ref
                    id: solar_phase
                  then:
                    kind: ref
                    id: surface_evaporation_flux
                  else:
                    kind: literal
                    value: 0.0
            - kind: op
              op: mul
              args:
                - kind: ref
                  id: infiltration_rate
                - kind: ref
                  id: water_height

      - id: diffuse_surface_water
        kind: diffusion
        reads:
          - water_height
          - surface_water_diffusivity
        writes:
          - water_height
        schedule:
          read_scope: stage_working
          write_mode: replace
        source: water_height
        coefficient:
          kind: ref
          id: surface_water_diffusivity

      - id: recharge_soil_moisture
        kind: source_sink
        reads:
          - water_height
          - soil_water_fraction
          - soil_recharge_rate
          - soil_drainage_rate
        writes:
          - soil_water_fraction
        schedule:
          read_scope: stage_working
          write_mode: accumulate
        target: soil_water_fraction
        term:
          kind: op
          op: sub
          args:
            - kind: op
              op: mul
              args:
                - kind: op
                  op: mul
                  args:
                    - kind: ref
                      id: soil_recharge_rate
                    - kind: ref
                      id: water_height
                - kind: op
                  op: sub
                  args:
                    - kind: literal
                      value: 1.0
                    - kind: ref
                      id: soil_water_fraction
            - kind: op
              op: mul
              args:
                - kind: ref
                  id: soil_drainage_rate
                - kind: ref
                  id: soil_water_fraction

  - id: biosphere
    description: "Derive fertility metrics and update vegetation cover."
    interactions:
      - id: compute_soil_fertility
        kind: compute
        reads:
          - soil_mineral_fraction
          - soil_water_fraction
        writes:
          - soil_fertility_index
        schedule:
          read_scope: stage_input
          write_mode: replace
        ast:
          kind: call
          name: min
          args:
            - kind: literal
              value: 1.0
            - kind: op
              op: add
              args:
                - kind: op
                  op: mul
                  args:
                    - kind: literal
                      value: 0.65
                    - kind: ref
                      id: soil_mineral_fraction
                - kind: op
                  op: mul
                  args:
                    - kind: literal
                      value: 0.35
                    - kind: ref
                      id: soil_water_fraction

      - id: compute_climatic_fertility
        kind: compute
        reads:
          - temperature
          - precipitation_flux
          - solar_irradiance
          - solar_peak_irradiance
          - optimal_growth_temperature
          - growth_temperature_tolerance
          - beneficial_precipitation_flux
        writes:
          - climatic_fertility_index
        schedule:
          read_scope: stage_input
          write_mode: replace
        ast:
          kind: call
          name: min
          args:
            - kind: literal
              value: 1.0
            - kind: op
              op: mul
              args:
                - kind: call
                  name: max
                  args:
                    - kind: literal
                      value: 0.0
                    - kind: op
                      op: div
                      args:
                        - kind: ref
                          id: solar_irradiance
                        - kind: ref
                          id: solar_peak_irradiance
                - kind: call
                  name: max
                  args:
                    - kind: literal
                      value: 0.0
                    - kind: op
                      op: sub
                      args:
                        - kind: literal
                          value: 1.0
                        - kind: op
                          op: div
                          args:
                            - kind: call
                              name: abs
                              args:
                                - kind: op
                                  op: sub
                                  args:
                                    - kind: ref
                                      id: temperature
                                    - kind: ref
                                      id: optimal_growth_temperature
                            - kind: ref
                              id: growth_temperature_tolerance
                - kind: call
                  name: min
                  args:
                    - kind: literal
                      value: 1.0
                    - kind: op
                      op: div
                      args:
                        - kind: ref
                          id: precipitation_flux
                        - kind: ref
                          id: beneficial_precipitation_flux

      - id: grow_leaf_area
        kind: source_sink
        reads:
          - soil_fertility_index
          - climatic_fertility_index
          - leaf_area_index
          - vegetation_growth_rate
          - vegetation_decay_rate
          - max_leaf_area_index
        writes:
          - leaf_area_index
        schedule:
          read_scope: stage_working
          write_mode: accumulate
        target: leaf_area_index
        term:
          kind: op
          op: sub
          args:
            - kind: op
              op: mul
              args:
                - kind: op
                  op: mul
                  args:
                    - kind: op
                      op: mul
                      args:
                        - kind: ref
                          id: vegetation_growth_rate
                        - kind: ref
                          id: soil_fertility_index
                    - kind: ref
                      id: climatic_fertility_index
                - kind: op
                  op: sub
                  args:
                    - kind: ref
                      id: max_leaf_area_index
                    - kind: ref
                      id: leaf_area_index
            - kind: op
              op: mul
              args:
                - kind: ref
                  id: vegetation_decay_rate
                - kind: ref
                  id: leaf_area_index

  - id: constraints
    description: "Enforce hard physical and normalized bounds after all process updates." # clamping is used here as a simple way to ensure that state variables remain within their physically meaningful ranges, preventing numerical instabilities and unphysical results from propagating through the model. More complex constraint types (e.g., soft constraints, optimization-based adjustments) could be added in future iterations for more sophisticated handling of variable bounds and interdependencies.
    interactions:
      - id: clamp_relative_humidity
        kind: constraint
        reads:
          - relative_humidity
        writes:
          - relative_humidity
        schedule:
          read_scope: stage_working
          write_mode: replace
        target: relative_humidity
        rule:
          type: clamp 
          min:
            kind: literal
            value: 0.0
          max:
            kind: literal
            value: 1.0

      - id: clamp_soil_water_fraction
        kind: constraint
        reads:
          - soil_water_fraction
        writes:
          - soil_water_fraction
        schedule:
          read_scope: stage_working
          write_mode: replace
        target: soil_water_fraction
        rule:
          type: clamp
          min:
            kind: literal
            value: 0.0
          max:
            kind: literal
            value: 1.0

      - id: clamp_soil_fertility_index
        kind: constraint
        reads:
          - soil_fertility_index
        writes:
          - soil_fertility_index
        schedule:
