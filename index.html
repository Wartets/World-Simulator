<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>World Simulator Interaction Graph</title>
        <link rel="stylesheet" href="sim_interaction_web/styles.css" />
        <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
    </head>
    <body>
        <div class="app">
            <header class="topbar">
                <div class="title-block">
                    <p class="eyebrow">World Simulator</p>
                    <h1>Interaction Topology</h1>
                    <p class="subhead">
                        Readable subsystem and state-field dependencies.
                    </p>
                </div>

                <div class="toolbar" aria-label="Graph controls">
                    <div class="toolbar-group">
                        <span class="control-label">Model</span>
                        <select id="modelSelector" class="model-selector" aria-label="Model selector">
                            <option value="">Loading models...</option>
                        </select>
                    </div>

                    <div class="toolbar-group toolbar-summary">
                        <span id="countsLabel" class="counts">0 nodes / 0 interactions</span>
                    </div>
                </div>
            </header>

            <main class="workspace">
                <section class="graph-shell" aria-label="Interaction graph">
                    <div id="graph"></div>
                </section>

                <aside class="details-panel" aria-label="Selection details">
                    <div class="panel-head">
                        <p class="panel-kicker">Selection</p>
                        <h2 id="selectionTitle">Overview</h2>
                        <p id="selectionSubtitle" class="selection-subtitle">
                            Choose a node or connection to inspect its details.
                        </p>
                    </div>

                    <div id="detailContent" class="detail-content"></div>
                </aside>
            </main>
        </div>

        <script src="sim_interaction_web/simmodel-loader.js"></script>
        <script src="sim_interaction_web/app.js" defer></script>
    </body>
</html>
